# Single-node KRaft Kafka for local testing, managed by the Strimzi operator
# (1.0.x, kafka.strimzi.io/v1 API, KRaft + KafkaNodePool). Ephemeral storage only.
# Kafka version must be one the operator supports (Strimzi 1.0.1: 4.1.x / 4.2.0).
apiVersion: kafka.strimzi.io/v1
kind: KafkaNodePool
metadata:
  name: dual-role
  namespace: kafka
  labels:
    strimzi.io/cluster: maestro
spec:
  replicas: 1
  roles:
    - controller
    - broker
  storage:
    type: ephemeral
---
apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: maestro
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: wikimedia.recentchange
  namespace: kafka
  labels:
    strimzi.io/cluster: maestro
spec:
  partitions: 6
  replicas: 1
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: wikimedia.edit-counts
  namespace: kafka
  labels:
    strimzi.io/cluster: maestro
spec:
  partitions: 6
  replicas: 1
