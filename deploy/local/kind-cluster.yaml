kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: maestro
nodes:
  - role: control-plane
    extraPortMappings:
      # control-api NodePort -> localhost:8080
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
# Use a local registry so locally-built images can be referenced by digest
# (the control plane requires digest-pinned images).
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."localhost:5001"]
      endpoint = ["http://kind-registry:5000"]
