{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "maestro.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "maestro.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  rules:
    {{- if and .Values.ingress.temporalUI.enabled (eq .Values.temporal.mode "bundled") .Values.temporal.bundled.uiEnabled }}
    - host: {{ .Values.ingress.temporalUI.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "maestro.fullname" . }}-temporal-web
                port:
                  number: 8080
    {{- end }}
    {{- if .Values.ingress.controlApi.enabled }}
    - host: {{ .Values.ingress.controlApi.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "maestro.fullname" . }}-control-api
                port:
                  number: {{ .Values.controlApi.service.port }}
    {{- end }}
{{- end }}
