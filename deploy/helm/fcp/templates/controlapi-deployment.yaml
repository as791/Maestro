apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "maestro.fullname" . }}-control-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "maestro.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-api
spec:
  {{- if not .Values.controlApi.autoscaling.enabled }}
  replicas: {{ .Values.controlApi.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: control-api
  template:
    metadata:
      labels:
        {{- include "maestro.labels" . | nindent 8 }}
        app.kubernetes.io/component: control-api
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "maestro.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: control-api
          image: "{{ .Values.image.controlApi.repository }}:{{ .Values.image.controlApi.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            {{- include "maestro.commonEnv" . | nindent 12 }}
            - name: HTTP_ADDRESS
              value: ":8080"
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            {{- toYaml .Values.controlApi.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "maestro.fullname" . }}-control-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "maestro.labels" . | nindent 4 }}
    app.kubernetes.io/component: control-api
spec:
  type: {{ .Values.controlApi.service.type }}
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: control-api
  ports:
    - name: http
      port: {{ .Values.controlApi.service.port }}
      targetPort: http
      {{- if and (eq .Values.controlApi.service.type "NodePort") .Values.controlApi.service.nodePort }}
      nodePort: {{ .Values.controlApi.service.nodePort }}
      {{- end }}
