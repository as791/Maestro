<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#09110f">
  <title>Maestro — Sign in</title>
  <link rel="icon" type="image/png" href="/ui/favicon.png">
  <link rel="icon" type="image/svg+xml" href="/ui/logo.svg">
  <link rel="apple-touch-icon" href="/ui/favicon.png">
  <link rel="stylesheet" href="/ui/styles.css">
  <script>
    (function() {
      var saved = localStorage.getItem("maestro.theme");
      if (saved === "dark") document.documentElement.setAttribute("data-theme", "dark");
    })();
  </script>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-card {
      width: min(380px, calc(100vw - 32px));
      padding: 40px 36px;
      border: 1px solid var(--line-bright);
      border-radius: var(--radius);
      background: var(--panel-bg);
      backdrop-filter: blur(24px) saturate(130%);
      box-shadow: var(--shadow);
      text-align: center;
    }
    [data-theme="dark"] .login-card {
      background: linear-gradient(180deg, rgba(27,40,38,.82), rgba(14,22,21,.78));
      box-shadow: 0 32px 80px rgba(0,0,0,.48);
    }
    .login-brand { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:24px; }
    .login-card h1 { margin:0 0 6px; font-size:22px; letter-spacing:.02em; }
    .login-card p { color:var(--muted); margin:0 0 32px; font-size:13px; line-height:1.5; }
    .google-btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 18px;
      border: 1px solid var(--line-bright);
      border-radius: 6px;
      background: var(--surface-2);
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      font-weight: 650;
      transition: border-color .15s;
    }
    .google-btn:hover { border-color: var(--green); }
    .login-note { margin-top: 24px; color: var(--muted); font-size: 11px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-brand">
      <img src="/ui/logo.svg" class="maestro-logo" width="48" height="48" alt="Maestro Logo">
      <div style="text-align:left">
        <strong style="display:block;letter-spacing:.08em">Maestro</strong>
        <small style="color:var(--muted)">Operations Console</small>
      </div>
    </div>
    <h1>Sign in to continue</h1>
    <p>Maestro Flink Control Plane manages Flink deployments<br>across your Kubernetes clusters.</p>
    <a href="/auth/login" class="google-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </a>
    <p class="login-note">Access is controlled by your organization's Google Workspace.</p>
  </div>
</body>
</html>
