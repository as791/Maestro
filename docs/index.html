<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maestro API Reference</title>
  <link rel="icon" type="image/png" href="/ui/favicon.png">
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    html {
      box-sizing: border-box;
      overflow-y: scroll;
    }
    *, *:before, *:after {
      box-sizing: inherit;
    }
    body {
      margin: 0;
      background: #f4f6f8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #swagger-ui {
      max-width: 1100px;
      margin: 30px auto;
      background: #ffffff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      border-radius: 12px;
      padding: 15px;
      border: 1px solid #e2e8f0;
    }
    .swagger-header {
      background-color: #09110f;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #ffffff;
    }
    .swagger-header .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .swagger-header .brand img {
      border-radius: 6px;
    }
    .swagger-header a {
      color: #9ca3af;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.15s;
    }
    .swagger-header a:hover {
      color: #ffffff;
    }
    .theme-toggle-btn {
      background: transparent;
      border: 1px solid #4b5563;
      color: #d1d5db;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .theme-toggle-btn:hover {
      border-color: #ffffff;
      color: #ffffff;
      background: rgba(255,255,255,0.05);
    }
    html[data-theme="dark"] {
      background: #0f172a;
      color: #f8fafc;
    }
    html[data-theme="dark"] body {
      background: #0f172a;
    }
    html[data-theme="dark"] #swagger-ui {
      background: #1e293b;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      border-color: #334155;
    }
    html[data-theme="dark"] .swagger-ui {
      filter: invert(88%) hue-rotate(180deg);
    }
    html[data-theme="dark"] .swagger-ui .microlight {
      filter: invert(100%) hue-rotate(180deg);
    }
  </style>
</head>
<body>
  <div class="swagger-header">
    <div class="brand">
      <img src="https://raw.githubusercontent.com/maestro-flink/maestro/main/internal/api/web/logo.svg" width="28" height="28" alt="Maestro Logo" onerror="this.src='/ui/logo.svg'">
      <span>Maestro API Reference</span>
    </div>
    <div style="display: flex; align-items: center; gap: 20px;">
      <a href="https://maestro.dev/docs">Documentation</a>
      <button class="theme-toggle-btn" id="theme-toggle">Dark Mode</button>
    </div>
  </div>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-standalone-preset.js"></script>
  <script>
    window.onload = () => {
      const ui = SwaggerUIBundle({
        url: 'https://raw.githubusercontent.com/maestro-flink/maestro/main/api/openapi.yaml',
        dom_id: '#swagger-ui',
        presets: [
          SwaggerUIBundle.presets.apis,
          SwaggerUIStandalonePreset
        ],
        layout: "BaseLayout",
        deepLinking: true,
        defaultModelsExpandDepth: 1,
        defaultModelExpandDepth: 1,
      });
      window.ui = ui;

      const toggle = document.getElementById("theme-toggle");
      const saved = localStorage.getItem("maestro.theme");
      if (saved === "dark") {
        document.documentElement.setAttribute("data-theme", "dark");
        toggle.textContent = "Light Mode";
      }

      toggle.onclick = () => {
        const current = document.documentElement.getAttribute("data-theme");
        if (current === "dark") {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("maestro.theme", "light");
          toggle.textContent = "Dark Mode";
        } else {
          document.documentElement.setAttribute("data-theme", "dark");
          localStorage.setItem("maestro.theme", "dark");
          toggle.textContent = "Light Mode";
        }
      };
    };
  </script>
</body>
</html>
