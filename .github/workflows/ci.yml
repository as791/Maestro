name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod tidy
      - name: Commit go.mod/go.sum changes
        if: always()
        env:
          REPO: ${{ github.repository }}
          HEAD_REF: ${{ github.head_ref || github.ref_name }}
        run: |
          if [ -n "$(git status --porcelain go.mod go.sum)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add go.mod go.sum
            git commit -m "chore: go mod tidy" || true
            # Only push when running on branches in the same repo (won't push for PRs from forks)
            git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${REPO}" HEAD:"${HEAD_REF}" || true
          else
            echo "go.mod and go.sum are clean"
          fi
      - run: git diff --exit-code -- go.mod go.sum
      - run: go test -race ./...
      - run: go vet ./...
      - run: go build ./...
      - run: docker compose config --quiet

  vulnerability-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
